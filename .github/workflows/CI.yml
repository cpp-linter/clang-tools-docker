name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile*'
      - 'docker-bake.hcl'
      - '.github/workflows/CI.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile*'
      - 'docker-bake.hcl'
      - '.github/workflows/CI.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  extract-targets:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.get-targets.outputs.targets }}
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Extract targets as JSON array
        uses: dcarbone/install-jq-action@v4
      - name: Get targets from bake file
        id: get-targets
        run: |
          TARGETS=$(docker buildx bake --file docker-bake.hcl --print | jq -c '[.target | keys[] | select(. != "default")]')
          echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"

  build:
    needs: extract-targets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for cosign keyless signing
      packages: write
    strategy:
      matrix:
        target: ${{ fromJson(needs.extract-targets.outputs.targets) }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Check formatting
        run: make install-deps && make lint

      - name: Check buildx bake
        run: docker buildx bake --file docker-bake.hcl --print

      - name: Build image for tag ${{ matrix.target }}
        run: docker buildx bake --file docker-bake.hcl ${{ matrix.target }}

      - name: Login container registries
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin

      - name: Publish image for tag ${{ matrix.target }} (with SBOM + provenance)
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
        run: |
          docker buildx bake --file docker-bake.hcl ${{ matrix.target }} --push \
            --set "*.attest=type=sbom" \
            --set "*.attest=type=provenance,mode=max"

      - name: Install cosign
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign images with cosign (keyless)
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
        run: |
          cosign sign --yes ghcr.io/cpp-linter/clang-tools:${{ matrix.target }}
          cosign sign --yes xianpengshen/clang-tools:${{ matrix.target }}

      - name: Remove builder instances
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
        run: docker buildx rm --all-inactive --force
