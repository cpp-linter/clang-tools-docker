name: Docker Scout

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - '.github/workflows/docker-scout.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - '.github/workflows/docker-scout.yml'

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          file: Dockerfile
          build-args: |
            BASE_IMAGE=ubuntu:questing
            CLANG_VERSION=21
          load: true
          tags: xianpengshen/clang-tools:21

      - name: Login to Docker Hub
        if: github.actor != 'dependabot[bot]'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Scout CVEs
        if: github.actor != 'dependabot[bot]'
        uses: docker/scout-action@2688993af7bafd6ba8c6a74ec652442be91dd82b # v1.23.1
        with:
          command: cves
          image: xianpengshen/clang-tools:21
          sarif-file: scout.sarif
          only-severities: critical,high

      - name: Upload SARIF to GitHub Code Scanning
        if: github.actor != 'dependabot[bot]'
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3.35.1
        with:
          sarif_file: scout.sarif
